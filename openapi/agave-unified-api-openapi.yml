components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: API-Key
      description: Agave API key for authentication.
  schemas:
    Project:
      type: object
      description: A construction project record from the linked source system.
      properties:
        id:
          type: string
          description: Agave unified project identifier.
          example: proj-500123
        source_id:
          type: string
          description: Project identifier in the source system.
          example: 12345
        name:
          type: string
          description: Project name.
          example: Downtown Office Building
        number:
          type: string
          description: Project number or code.
          example: '2025-001'
        status:
          type: string
          description: Project status.
          enum:
          - active
          - inactive
          - completed
          example: active
        address:
          type: string
          description: Project address.
          example: 123 Main St, San Francisco, CA 94105
        start_date:
          type: string
          format: date
          description: Project start date.
          example: '2025-01-15'
        estimated_completion_date:
          type: string
          format: date
          description: Estimated project completion date.
          example: '2026-06-30'
        total_budget:
          type: number
          description: Total approved project budget in USD.
          example: 5000000.00
        created_at:
          type: string
          format: date-time
          description: Timestamp when the record was created.
          example: '2025-01-15T09:00:00Z'
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the record was last updated.
          example: '2025-04-01T12:00:00Z'
    ProjectList:
      type: object
      description: Paginated list of projects.
      properties:
        data:
          type: array
          description: Array of project records.
          items:
            $ref: '#/components/schemas/Project'
          example:
          - example_value
        next_cursor:
          type: string
          description: Cursor for the next page of results.
          example: eyJpZCI6MTIzfQ==
        count:
          type: integer
          description: Number of records returned.
          example: 50
    Budget:
      type: object
      description: A budget line item for a construction project.
      properties:
        id:
          type: string
          description: Agave budget line item identifier.
          example: bud-112233
        project_id:
          type: string
          description: Associated project identifier.
          example: proj-500123
        cost_code_id:
          type: string
          description: Associated cost code identifier.
          example: cc-445566
        description:
          type: string
          description: Budget line item description.
          example: Concrete Foundation Work
        original_amount:
          type: number
          description: Original budgeted amount in USD.
          example: 250000.00
        revised_amount:
          type: number
          description: Revised budget amount including changes.
          example: 275000.00
        actual_cost:
          type: number
          description: Actual cost incurred to date.
          example: 180000.00
        projected_cost:
          type: number
          description: Total projected cost at completion.
          example: 270000.00
    BudgetList:
      type: object
      description: Paginated list of budget line items.
      properties:
        data:
          type: array
          description: Array of budget records.
          items:
            $ref: '#/components/schemas/Budget'
          example:
          - example_value
        next_cursor:
          type: string
          description: Cursor for the next page.
          example: eyJpZCI6MTIzfQ==
        count:
          type: integer
          description: Number of records returned.
          example: 100
    Contract:
      type: object
      description: A prime contract for a construction project.
      properties:
        id:
          type: string
          description: Contract identifier.
          example: con-778899
        project_id:
          type: string
          description: Associated project identifier.
          example: proj-500123
        name:
          type: string
          description: Contract name.
          example: Prime Construction Contract
        number:
          type: string
          description: Contract number.
          example: GC-2025-001
        status:
          type: string
          description: Contract status.
          enum:
          - draft
          - approved
          - executed
          - completed
          - voided
          example: executed
        original_value:
          type: number
          description: Original contract value in USD.
          example: 4500000.00
        revised_value:
          type: number
          description: Revised contract value including change orders.
          example: 4750000.00
        executed_date:
          type: string
          format: date
          description: Date the contract was executed.
          example: '2025-01-20'
    ContractList:
      type: object
      description: Paginated list of contracts.
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Contract'
          example:
          - example_value
        next_cursor:
          type: string
          example: eyJpZCI6MTIzfQ==
        count:
          type: integer
          example: 10
    Vendor:
      type: object
      description: A vendor or subcontractor record.
      properties:
        id:
          type: string
          description: Vendor identifier.
          example: ven-334455
        name:
          type: string
          description: Vendor name.
          example: ABC Concrete Contractors
        email:
          type: string
          description: Primary vendor contact email.
          example: admin@abcconcrete.com
        phone:
          type: string
          description: Vendor phone number.
          example: 14155551234
        address:
          type: string
          description: Vendor address.
          example: 456 Industrial Blvd, Oakland, CA 94601
        tax_id:
          type: string
          description: Vendor tax identification number.
          example: '12-3456789'
        status:
          type: string
          description: Vendor status.
          enum:
          - active
          - inactive
          example: active
    VendorList:
      type: object
      description: Paginated list of vendors.
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Vendor'
          example:
          - example_value
        next_cursor:
          type: string
          example: eyJpZCI6MTIzfQ==
        count:
          type: integer
          example: 50
    CostCode:
      type: object
      description: A job cost code for categorizing construction costs.
      properties:
        id:
          type: string
          description: Cost code identifier.
          example: cc-445566
        project_id:
          type: string
          description: Associated project identifier.
          example: proj-500123
        code:
          type: string
          description: Cost code value.
          example: '03-1000'
        description:
          type: string
          description: Cost code description.
          example: Concrete
        cost_type:
          type: string
          description: Cost type classification.
          enum:
          - labor
          - material
          - equipment
          - subcontract
          - other
          example: material
    CostCodeList:
      type: object
      description: Paginated list of cost codes.
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CostCode'
          example:
          - example_value
        next_cursor:
          type: string
          example: eyJpZCI6MTIzfQ==
        count:
          type: integer
          example: 200
    Invoice:
      type: object
      description: An accounts payable invoice.
      properties:
        id:
          type: string
          description: Invoice identifier.
          example: inv-667788
        project_id:
          type: string
          description: Associated project identifier.
          example: proj-500123
        vendor_id:
          type: string
          description: Vendor who issued the invoice.
          example: ven-334455
        invoice_number:
          type: string
          description: Vendor invoice number.
          example: INV-2025-1042
        amount:
          type: number
          description: Invoice total amount in USD.
          example: 85000.00
        status:
          type: string
          description: Invoice processing status.
          enum:
          - draft
          - submitted
          - approved
          - paid
          - rejected
          example: approved
        invoice_date:
          type: string
          format: date
          description: Invoice date.
          example: '2025-03-01'
        due_date:
