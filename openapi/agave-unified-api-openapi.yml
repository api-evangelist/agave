        schema:
          type: string
        example: linked-account-abc123
      - name: project_id
        in: query
        description: Filter timesheets by project ID.
        schema:
          type: string
        example: proj-500123
      - name: date_from
        in: query
        description: Start date for timesheet filter (YYYY-MM-DD).
        schema:
          type: string
          format: date
        example: '2025-01-01'
      - name: date_to
        in: query
        description: End date for timesheet filter (YYYY-MM-DD).
        schema:
          type: string
          format: date
        example: '2025-01-31'
      responses:
        '200':
          description: A list of timesheets.
          content:
