specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Agave
providerId: agave
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Agave
serviceCategory: Construction Tech / Integration
tags:
  - Accounting
  - Construction
  - Integration
  - FinOps
  - FOCUS
description: FOCUS-aligned FinOps shape for Agave's Unified Construction API. Agave is sold as a custom
  contract scoped by systems integrated, companies, modules, and customizations; there is no public
  rate card.
notes: No public pricing; meters reflect the contract dimensions Agave uses to scope quotes (modules,
  companies, source systems) plus integration request volume that customers should track for unit
  economics.
sources:
  - https://useagave.com/contractors/pricing
  - https://docs.agaveapi.com/
billingModel:
  pricingCategory: Custom Contract
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Adjustment
focusColumns:
  ServiceName: Agave Unified Construction API
  ServiceCategory: Construction Tech / Integration
  ProviderName: Agave
  PublisherName: Agave
  InvoiceIssuerName: Agave
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: contract_subscription
    description: Annual or multi-year custom contract fee
    unit: contract
    aggregation: sum
    dimensions:
      - module
      - source_system
      - company_count
  - name: source_system_connections
    description: Distinct ERP / construction-platform integrations covered by the contract
    unit: connection
    aggregation: count
    dimensions:
      - source_system
      - deployment_type
  - name: integration_requests
    description: API requests Agave makes downstream to integrated source systems on the customer's behalf
    unit: request
    aggregation: sum
    dimensions:
      - source_system
      - module
principles:
  - name: Visibility
    description: Track Agave costs at contract-renewal granularity since pricing is annual and custom;
      pair with Agave's webhook/event logs to monitor sync volume per source system.
  - name: Allocation
    description: Allocate cost by module (Core / AP / AR / Workforce / Forecast) and by company entity
      since both factor directly into Agave's scoping formula.
  - name: Optimization
    description: Optimize by consolidating which source ERPs are connected, deferring optional modules
      until they're justified, and minimizing customizations against Agave defaults to keep quotes lean.
  - name: Accountability
    description: Construction operations or IT integration owners typically hold the Agave budget; align
      renewal review with the underlying ERP contracts whose data Agave is syncing.
maintainers:
