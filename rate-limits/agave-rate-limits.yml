specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Agave
providerId: agave
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Accounting
  - Construction
  - Integration
  - Rate Limiting
description: Agave does not publish numeric rate limits for its Unified Construction API on its public
  site. Limits and throttling behavior are defined per contract, and downstream sync throughput is
  generally bounded by each integrated source ERP's own rate limits (Procore, Sage, Viewpoint, etc.)
  rather than Agave-imposed ceilings. Implementation guidance is provided during 1:1 onboarding.
notes: No public rate-limit documentation; values below are placeholder defaults pending direct vendor
  confirmation.
sources:
  - https://useagave.com/contractors/pricing
  - https://docs.agaveapi.com/
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Source-system passthrough
    scope: account
    metric: varies
    limit: bounded by underlying ERP/source-system rate limits
    notes: Agave proxies calls to integrated platforms; effective throughput is typically constrained
      by the source ERP's published limits rather than an Agave-imposed cap.
policies:
  - name: Backoff Strategy
    description: Clients should implement exponential backoff with jitter on 429 and 503 responses,
      honoring any Retry-After header returned.
  - name: Source-System Pacing
    description: When syncing against rate-limited ERPs (Procore, Sage Intacct, etc.), pace calls to
      stay within the source platform's published limits even when Agave does not throttle.
  - name: Contractual Limits
    description: Throughput, burst, and concurrency expectations are negotiated as part of the customer
      contract; contact your Agave implementation expert to raise limits.
maintainers:
