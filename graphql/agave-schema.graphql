  # Invoices
  invoices(filter: InvoiceFilter, pagination: PaginationInput): InvoiceConnection!
  invoice(id: ID!): Invoice

  # Payments
  payments(filter: PaymentFilter, pagination: PaginationInput): PaymentConnection!

  # Change Orders
  changeOrders(projectId: ID!): [ChangeOrder!]!
