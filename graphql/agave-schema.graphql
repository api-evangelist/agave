}

input CreateBudgetItemInput {
  projectId: ID!
  costCodeId: ID
  description: String!
  originalAmount: Decimal!
  quantity: Decimal
  unit: String
  unitCost: Decimal
}

# ─── Purchase Order ───────────────────────────────────────────────────────────

type PO {
  id: ID!
  number: String!
  project: Project!
  vendor: Vendor!
  status: String
  issueDate: Date
  totalAmount: Decimal!
  lineItems: [POLineItem!]
  invoices: [Invoice!]
  sourceData: JSON
  createdAt: DateTime
  updatedAt: DateTime
}

"""Alias for PO to support both naming conventions."""
type PurchaseOrder {
  id: ID!
  number: String!
  project: Project!
  vendor: Vendor!
  status: String
  issueDate: Date
  dueDate: Date
  totalAmount: Decimal!
  committedAmount: Decimal
  invoicedAmount: Decimal
  paidAmount: Decimal
  description: String
  lineItems: [POLineItem!]
  invoices: [Invoice!]
  sourceData: JSON
  createdAt: DateTime
  updatedAt: DateTime
}

type POLineItem {
  id: ID!
  purchaseOrder: PurchaseOrder!
  costCode: CostCode
  description: String!
  quantity: Decimal
  unit: String
  unitCost: Decimal
  totalAmount: Decimal!
  sourceData: JSON
}

type POConnection {
  edges: [POEdge!]
  pageInfo: PageInfo!
}

type POEdge {
  node: PurchaseOrder!
  cursor: String!
}

input POFilter {
  projectId: ID
  vendorId: ID
  status: String
}

input CreatePOInput {
  projectId: ID!
  vendorId: ID!
  number: String
  issueDate: Date
  description: String
  lineItems: [POLineItemInput!]!
}

input POLineItemInput {
  costCodeId: ID
  description: String!
  quantity: Decimal
  unit: String
  unitCost: Decimal!
  totalAmount: Decimal!
}

