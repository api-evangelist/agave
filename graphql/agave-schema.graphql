"""
Agave Unified Construction API - Conceptual GraphQL Schema
Base API: https://api.agaveapi.com
Documentation: https://docs.agaveapi.com/
Normalizes data across 100+ construction and accounting platforms including
Procore, Autodesk Build, QuickBooks, Sage, Viewpoint, Foundation, and CMiC.
"""

# ─── Scalars ─────────────────────────────────────────────────────────────────

scalar Date
scalar DateTime
scalar Decimal
scalar JSON

# ─── Pagination ──────────────────────────────────────────────────────────────

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
  totalCount: Int
}

input PaginationInput {
  first: Int
  after: String
  last: Int
  before: String
}

# ─── Enums ───────────────────────────────────────────────────────────────────

enum ProjectStatus {
  ACTIVE
  INACTIVE
  COMPLETED
  CANCELLED
  ON_HOLD
  PENDING
}

enum ProjectType {
  COMMERCIAL
  RESIDENTIAL
  INDUSTRIAL
  INFRASTRUCTURE
  HEALTHCARE
  EDUCATION
  MIXED_USE
  OTHER
}

enum RFIStatus {
  DRAFT
  OPEN
  ANSWERED
  CLOSED
  VOID
}

enum SubmittalStatus {
  DRAFT
  SUBMITTED
  UNDER_REVIEW
  APPROVED
  APPROVED_WITH_COMMENTS
  REVISE_AND_RESUBMIT
  REJECTED
  CLOSED
}

enum CompanyType {
  GENERAL_CONTRACTOR
  SUBCONTRACTOR
  OWNER
  ARCHITECT
  ENGINEER
  SUPPLIER
  CONSULTANT
  OTHER
}

enum InvoiceStatus {
  DRAFT
  SUBMITTED
  UNDER_REVIEW
  APPROVED
  PAID
  VOID
  REJECTED
}

enum ChangeOrderStatus {
  DRAFT
  PENDING
  APPROVED
  REJECTED
  VOID
}

enum WebhookEvent {
  PROJECT_CREATED
  PROJECT_UPDATED
  BUDGET_UPDATED
  PURCHASE_ORDER_CREATED
  PURCHASE_ORDER_UPDATED
  SUBCONTRACT_CREATED
  SUBCONTRACT_UPDATED
  INVOICE_CREATED
  INVOICE_UPDATED
  INVOICE_APPROVED
  CHANGE_ORDER_CREATED
  CHANGE_ORDER_UPDATED
  RFI_CREATED
  RFI_UPDATED
  SUBMITTAL_CREATED
  SUBMITTAL_UPDATED
  TIMECARD_CREATED
  TIMECARD_UPDATED
  PAYMENT_CREATED
}

# ─── Project ─────────────────────────────────────────────────────────────────

type Project {
  id: ID!
  sourceId: String
  name: String!
  status: ProjectStatus
  type: ProjectType
  number: String
  description: String
  startDate: Date
  completionDate: Date
  address: Address
  jobSite: JobSite
  totalContractAmount: Decimal
  budgetAmount: Decimal
  details: ProjectDetails
  costCodes: [CostCode!]
  budgetItems: [BudgetItem!]
  commitments: [Commitment!]
  changeOrders: [ChangeOrder!]
  rfis: [RFI!]
  submittals: [Submittal!]
  dailyLogs: [DailyLog!]
  drawings: [Drawing!]
  specifications: [Specification!]
  sourceData: JSON
  createdAt: DateTime
  updatedAt: DateTime
}

type ProjectDetails {
  projectManager: Contact
  superintendent: Contact
  owner: Company
  architect: Company
  engineer: Company
  laborType: String
  taxExempt: Boolean
  certified: Boolean
  customFields: JSON
}

type ProjectConnection {
  edges: [ProjectEdge!]
  pageInfo: PageInfo!
}

type ProjectEdge {
  node: Project!
  cursor: String!
}

input ProjectFilter {
  status: ProjectStatus
  type: ProjectType
  startDateAfter: Date
  startDateBefore: Date
  search: String
}

input CreateProjectInput {
  name: String!
  number: String
  status: ProjectStatus
  type: ProjectType
  description: String
  startDate: Date
  completionDate: Date
  address: AddressInput
  totalContractAmount: Decimal
}

input UpdateProjectInput {
  name: String
  status: ProjectStatus
  description: String
  completionDate: Date
  totalContractAmount: Decimal
}

# ─── Job Site ────────────────────────────────────────────────────────────────

type JobSite {
  id: ID!
  name: String
  address: Address
  details: JobSiteDetails
  sourceData: JSON
}

type JobSiteDetails {
  latitude: Decimal
  longitude: Decimal
  timezone: String
  accessInstructions: String
  customFields: JSON
}

# ─── Job Cost ────────────────────────────────────────────────────────────────

type JobCost {
  id: ID!
  project: Project!
  costCode: CostCode
  description: String
  budgetAmount: Decimal
  committedAmount: Decimal
  forecastAmount: Decimal
  actualCostToDate: Decimal
  details: JobCostDetails
  sourceData: JSON
  createdAt: DateTime
  updatedAt: DateTime
}

type JobCostDetails {
  budgetRevisions: [BudgetRevision!]
  changeOrderImpact: Decimal
  percentComplete: Decimal
  estimatedCostAtCompletion: Decimal
  variance: Decimal
  customFields: JSON
}

type JobCostConnection {
  edges: [JobCostEdge!]
  pageInfo: PageInfo!
}

type JobCostEdge {
  node: JobCost!
  cursor: String!
}

input JobCostFilter {
  costCodeId: ID
  hasVariance: Boolean
}

