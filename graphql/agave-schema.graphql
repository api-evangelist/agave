}

input CostCodeFilter {
  division: String
  search: String
}

# ─── Budget ──────────────────────────────────────────────────────────────────

type BudgetItem {
  id: ID!
  project: Project!
  costCode: CostCode
  description: String
  originalAmount: Decimal!
  revisedAmount: Decimal
  approvedChanges: Decimal
  pendingChanges: Decimal
  details: BudgetItemDetails
  sourceData: JSON
  createdAt: DateTime
  updatedAt: DateTime
}

type BudgetItemDetails {
  quantity: Decimal
  unit: String
  unitCost: Decimal
  laborHours: Decimal
  revisions: [BudgetRevision!]
  customFields: JSON
}

type BudgetRevision {
  id: ID!
  budgetItem: BudgetItem!
