specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Agave
providerId: agave
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Accounting
  - Construction
  - Integration
description: Agave does not publish list prices for its Unified Construction API. Pricing is custom and
  modular, derived from four variables (systems integrated, number of companies, sync modules, and
  customizations). All engagements include unlimited users/projects, 1:1 onboarding, post-implementation
  support, a 99% uptime guarantee with credits, and SOC 2 Type I/II compliance. Contact sales for a
  quote.
notes: No public pricing page; values below are placeholders pending a sales quote. Module list reflects
  Agave's published Sync product packaging (Core required; AP, AR, Workforce, Forecast optional).
sources:
  - https://useagave.com/contractors/pricing
plans:
  - id: agave-custom
    name: Custom (Contact Sales)
    type: enterprise
    description: Quoted engagement for ERP sync. Cost depends on systems integrated, number of companies,
      modules selected, and customizations. Includes unlimited users/projects, dedicated onboarding,
      ongoing support, 99% uptime guarantee, SOC 2 Type I/II, and annual penetration testing.
    entries:
      - label: Custom contract
        name: custom_contract
        type: subscription
        metric: contract
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Core module (Projects, Cost Codes, Vendors, Cost Types, Customers, Budgets, Sub Jobs)
      - name: Accounts Payable module (optional)
      - name: Accounts Receivable module (optional)
      - name: Workforce module (optional)
      - name: Forecast module (optional)
      - name: Unlimited users and projects
      - name: 1:1 onboarding with implementation expert
      - name: Unlimited post-implementation support
      - name: 99% uptime guarantee with credits
      - name: SOC 2 Type I & II certification
      - name: Annual penetration testing
maintainers:
