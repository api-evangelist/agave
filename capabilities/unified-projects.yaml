naftiko: 1.0.0-alpha2
info:
  label: Agave Unified Construction API — Projects
  description: 'Agave Unified Construction API — Projects. 2 operations. Lead operation: Agave List Projects. Self-contained
    Naftiko capability covering one Agave business surface.'
  tags:
  - Agave
  - Projects
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AGAVE_API_KEY: AGAVE_API_KEY
capability:
  consumes:
  - type: http
    namespace: unified-projects
    baseUri: https://api.agaveapi.com/v1
    description: Agave Unified Construction API — Projects business capability. Self-contained, no shared references.
    resources:
    - name: projects
      path: /projects
      operations:
      - name: listprojects
        method: GET
        description: Agave List Projects
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: source_system_id
          in: header
          type: string
          description: The linked account source system identifier.
          required: true
        - name: limit
          in: query
          type: integer
          description: Maximum number of results to return.
        - name: cursor
          in: query
          type: string
          description: Pagination cursor for the next page of results.
    - name: projects-id
      path: /projects/{id}
      operations:
      - name: getproject
        method: GET
        description: Agave Get Project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: source_system_id
          in: header
          type: string
          description: The linked account source system identifier.
          required: true
        - name: id
          in: path
          type: string
          description: Project identifier.
          required: true
    authentication:
      type: apikey
      key: API-Key
      value: '{{env.AGAVE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: unified-projects-rest
    port: 8080
    description: REST adapter for Agave Unified Construction API — Projects. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/projects
      name: projects
      description: REST surface for projects.
      operations:
      - method: GET
        name: listprojects
        description: Agave List Projects
        call: unified-projects.listprojects
        with:
          source_system_id: rest.source_system_id
          limit: rest.limit
          cursor: rest.cursor
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/projects/{id}
      name: projects-id
      description: REST surface for projects-id.
      operations:
      - method: GET
        name: getproject
        description: Agave Get Project
        call: unified-projects.getproject
        with:
          source_system_id: rest.source_system_id
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: unified-projects-mcp
    port: 9090
    transport: http
    description: MCP adapter for Agave Unified Construction API — Projects. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: agave-list-projects
      description: Agave List Projects
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: unified-projects.listprojects
      with:
        source_system_id: tools.source_system_id
        limit: tools.limit
        cursor: tools.cursor
      outputParameters:
      - type: object
        mapping: $.
    - name: agave-get-project
      description: Agave Get Project
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: unified-projects.getproject
      with:
        source_system_id: tools.source_system_id
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
