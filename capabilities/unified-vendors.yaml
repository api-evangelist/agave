naftiko: 1.0.0-alpha2
info:
  label: Agave Unified Construction API — Vendors
  description: 'Agave Unified Construction API — Vendors. 1 operations. Lead operation: Agave List Vendors. Self-contained
    Naftiko capability covering one Agave business surface.'
  tags:
  - Agave
  - Vendors
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AGAVE_API_KEY: AGAVE_API_KEY
capability:
  consumes:
  - type: http
    namespace: unified-vendors
    baseUri: https://api.agaveapi.com/v1
    description: Agave Unified Construction API — Vendors business capability. Self-contained, no shared references.
    resources:
    - name: vendors
      path: /vendors
      operations:
      - name: listvendors
        method: GET
        description: Agave List Vendors
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: source_system_id
          in: header
          type: string
          description: The linked account source system identifier.
          required: true
        - name: limit
          in: query
          type: integer
          description: Maximum number of results to return.
    authentication:
      type: apikey
      key: API-Key
      value: '{{env.AGAVE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: unified-vendors-rest
    port: 8080
    description: REST adapter for Agave Unified Construction API — Vendors. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/vendors
      name: vendors
      description: REST surface for vendors.
      operations:
      - method: GET
        name: listvendors
        description: Agave List Vendors
        call: unified-vendors.listvendors
        with:
          source_system_id: rest.source_system_id
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: unified-vendors-mcp
    port: 9090
    transport: http
    description: MCP adapter for Agave Unified Construction API — Vendors. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: agave-list-vendors
      description: Agave List Vendors
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: unified-vendors.listvendors
      with:
        source_system_id: tools.source_system_id
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
